# Local development infrastructure: PostgreSQL (pgvector) + Redis
# Run: docker compose up -d
# Connect from host: localhost:5433 (postgres), localhost:6380 (redis)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: realestate_postgres
    environment:
      POSTGRES_DB: realestate_ai
      POSTGRES_USER: realestate_dev
      POSTGRES_PASSWORD: realestate_dev_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate_dev -d realestate_ai"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
